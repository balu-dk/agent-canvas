<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0d0d1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", sans-serif;
      color: #e2e8f0;
      user-select: none;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    .tagline {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 36px;
    }

    /* Spinner */
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.3px;
    }

    /* Progress dots animation for status text */
    .dots::after {
      content: "";
      animation: dots 1.5s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ""; }
      33%  { content: "."; }
      66%  { content: ".."; }
      100% { content: "..."; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎨</div>
    <h1>Agent Canvas</h1>
    <p class="tagline">AI coding agent interface</p>
    <div class="spinner"></div>
    <p class="status">Starting services<span class="dots"></span></p>
  </div>
</body>
</html>
